title: Aaron Earle-Richardson
tagline: Neural signal processing & BCI engineering
description: >-
  Portfolio of Aaron Earle-Richardson — neural signal processing, BCI, and
  machine learning engineering.
# This repo is named "Aaronearlerichardson.github.io", so GitHub Pages
# serves it as a USER site at the domain root — baseurl stays empty.
# If it's ever renamed to something else (project site), GitHub Pages
# switches to serving it at /<repo-name>/ instead: set baseurl to
# "/<repo-name>" (and update repo_name below) when that happens, since
# every relative_url / absolute_url call site-wide (nav links, CSS/JS,
# the search index fetch, canonical tags, sitemap) reads baseurl from
# here. See README "Publishing" section.
url: "https://aaronearlerichardson.github.io"
baseurl: ""

author:
  name: Aaron Earle-Richardson
  email: jakdaxter31@gmail.com
  github: Aaronearlerichardson
  linkedin: aaron-earle-richardson-781747184

# Name of this GitHub repo — used to build the "view source" link in the
# footer. Keep in sync with baseurl above.
repo_name: Aaronearlerichardson.github.io

# The github-pages gem defaults every site to a bundled theme
# (jekyll-theme-primer) unless this is explicitly disabled — this site
# is hand-rolled, so it stays off.
theme: null

# GitHub Pages builds with the `github-pages` gem, so the Jekyll version
# and every plugin below matches what pages.github.com serves in
# production. No custom Actions build is needed. See README for details.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
    values:
      layout: default

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
